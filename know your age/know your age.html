<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة العمر الزمني</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #8a6c28;
    --deep: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --surface3: #222230;
    --text: #f0ead6;
    --text-muted: #8a8070;
    --accent: #4a9eff;
    --ruby: #c94a6e;
    --emerald: #4ac99a;
    --shadow: rgba(0,0,0,0.5);
    --border-subtle: rgba(255,255,255,0.06);
    --transition-theme: background 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
  }

  /* ===== LIGHT MODE ===== */
  html.light {
    --gold: #a07828;
    --gold-light: #c9a84c;
    --gold-dark: #6b5018;
    --deep: #f5f0e8;
    --surface: #fffdf7;
    --surface2: #f0ead8;
    --surface3: #e8e0cc;
    --text: #1a1410;
    --text-muted: #7a6a50;
    --ruby: #b03055;
    --shadow: rgba(100,80,40,0.15);
    --border-subtle: rgba(160,120,40,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: var(--transition-theme);
  }

  /* Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(74,158,255,0.05) 0%, transparent 60%),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 60px,
        rgba(201,168,76,0.015) 60px,
        rgba(201,168,76,0.015) 61px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 60px,
        rgba(201,168,76,0.015) 60px,
        rgba(201,168,76,0.015) 61px
      );
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.4s ease;
  }

  html.light body::before {
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(160,120,40,0.05) 0%, transparent 60%),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 60px,
        rgba(160,120,40,0.04) 60px,
        rgba(160,120,40,0.04) 61px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 60px,
        rgba(160,120,40,0.04) 60px,
        rgba(160,120,40,0.04) 61px
      );
  }

  /* Theme Toggle Button */
  .theme-toggle {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 1000;
    background: var(--surface2);
    border: 1.5px solid rgba(201,168,76,0.3);
    border-radius: 50px;
    padding: 8px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px var(--shadow);
    user-select: none;
  }

  .theme-toggle:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px var(--shadow);
  }

  .toggle-track {
    width: 44px;
    height: 24px;
    background: var(--surface3);
    border-radius: 50px;
    position: relative;
    border: 1.5px solid rgba(201,168,76,0.25);
    transition: background 0.3s ease;
    flex-shrink: 0;
  }

  html.light .toggle-track {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-color: var(--gold);
  }

  .toggle-knob {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 18px;
    height: 18px;
    background: var(--gold);
    border-radius: 50%;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  html.light .toggle-knob {
    transform: translateX(-20px);
    background: white;
  }

  .toggle-icon { font-size: 1.1rem; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 60px;
    animation: fadeDown 1s ease both;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 16px;
  }

  .logo-line::before,
  .logo-line::after {
    content: '';
    flex: 1;
    max-width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .logo-icon {
    font-size: 36px;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.6));
    animation: pulse 3s ease-in-out infinite;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 300;
  }

  /* Input Section */
  .input-section {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 24px;
    padding: 48px;
    margin-bottom: 50px;
    box-shadow: 0 40px 80px var(--shadow), inset 0 1px 0 rgba(201,168,76,0.1);
    animation: fadeUp 1s ease 0.2s both;
    position: relative;
    overflow: hidden;
    transition: var(--transition-theme);
  }

  .input-section::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .input-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }

  .input-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .date-input {
    background: var(--surface3);
    border: 2px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 1.4rem;
    font-weight: 500;
    padding: 18px 28px;
    text-align: center;
    outline: none;
    transition: all 0.3s;
    cursor: pointer;
    letter-spacing: 1px;
  }

  html.light .date-input::-webkit-calendar-picker-indicator {
    filter: none;
    opacity: 0.6;
  }

  .date-input::-webkit-calendar-picker-indicator {
    filter: invert(1) sepia(1) saturate(5) hue-rotate(10deg);
    cursor: pointer;
  }

  .date-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(201,168,76,0.12), 0 0 30px rgba(201,168,76,0.1);
  }

  .calc-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none;
    border-radius: 16px;
    color: var(--deep);
    font-family: 'Tajawal', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 18px 40px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(201,168,76,0.3);
    position: relative;
    overflow: hidden;
  }

  .calc-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .calc-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(201,168,76,0.4);
  }

  .calc-btn:hover::after { opacity: 1; }
  .calc-btn:active { transform: translateY(0); }

  /* Results */
  #results {
    display: none;
    animation: fadeUp 0.8s ease both;
  }

  /* Live Counter */
  .live-banner {
    background: linear-gradient(135deg, rgba(201,168,76,0.1), rgba(201,168,76,0.05));
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 20px;
    padding: 32px;
    text-align: center;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }

  .live-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--ruby);
    border-radius: 50%;
    margin-left: 8px;
    animation: blink 1s ease-in-out infinite;
    box-shadow: 0 0 8px var(--ruby);
  }

  .live-label {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .live-seconds {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-variant-numeric: tabular-nums;
    letter-spacing: 3px;
  }

  .live-unit {
    font-size: 1rem;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 2px;
  }

  /* Calendar Systems */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent);
  }

  /* Main Stats Grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: linear-gradient(135deg, var(--surface2), var(--surface));
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 18px;
    padding: 28px 20px;
    text-align: center;
    transition: all 0.3s, var(--transition-theme);
    position: relative;
    overflow: hidden;
  }

  .stat-card:hover {
    border-color: rgba(201,168,76,0.3);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--grad, linear-gradient(90deg, var(--gold), var(--gold-light)));
  }

  .stat-card[data-type="seconds"] { --grad: linear-gradient(90deg, #c94a6e, #ff7a9a); }
  .stat-card[data-type="minutes"] { --grad: linear-gradient(90deg, #c9a84c, #e8c97a); }
  .stat-card[data-type="hours"] { --grad: linear-gradient(90deg, #4a9eff, #7abcff); }
  .stat-card[data-type="days"] { --grad: linear-gradient(90deg, #4ac99a, #7ae8c4); }
  .stat-card[data-type="weeks"] { --grad: linear-gradient(90deg, #a84cc9, #c97ae8); }
  .stat-card[data-type="months"] { --grad: linear-gradient(90deg, #c9784c, #e8a47a); }
  .stat-card[data-type="years"] { --grad: linear-gradient(90deg, #c9a84c, #fff0a0); }

  .stat-icon { font-size: 2rem; margin-bottom: 12px; }
  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    font-weight: 900;
    color: var(--text);
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 8px;
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* Calendar Systems Grid */
  .calendars-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .calendar-card {
    background: linear-gradient(135deg, var(--surface2), var(--surface));
    border: 1px solid var(--border-subtle);
    border-radius: 20px;
    padding: 28px;
    transition: all 0.3s, var(--transition-theme);
    position: relative;
    overflow: hidden;
  }

  .calendar-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }

  .calendar-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--cal-color, var(--gold));
  }

  .cal-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .cal-emoji { font-size: 2rem; }

  .cal-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .cal-origin {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-top: 3px;
  }

  .cal-date {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--cal-color, var(--gold));
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .cal-age {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.8;
  }

  .cal-age span {
    color: var(--text);
    font-weight: 600;
  }

  /* Next Birthday */
  .birthday-card {
    background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03));
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 20px;
    padding: 36px;
    text-align: center;
    margin-bottom: 40px;
  }

  .birthday-title {
    font-size: 0.8rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .birthday-count {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .birthday-sub {
    font-size: 0.9rem;
    color: var(--text-muted);
  }

  /* Fun Facts */
  .facts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
  }

  .fact-card {
    background: var(--surface2);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: all 0.3s, var(--transition-theme);
  }

  .fact-card:hover {
    border-color: rgba(201,168,76,0.2);
    transform: translateX(-4px);
  }

  .fact-icon {
    font-size: 2rem;
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    background: rgba(201,168,76,0.08);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fact-text { font-size: 0.85rem; color: var(--text-muted); line-height: 1.7; }
  .fact-text strong { color: var(--text); font-size: 1rem; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes countUp {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .animate-in { animation: countUp 0.5s ease both; }

  /* Responsive */
  @media (max-width: 600px) {
    .input-section { padding: 28px 20px; }
    .input-row { flex-direction: column; width: 100%; }
    .date-input, .calc-btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Theme Toggle -->
  <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" title="تبديل الوضع">
    <span class="toggle-icon" id="themeIcon">🌙</span>
    <div class="toggle-track">
      <div class="toggle-knob"></div>
    </div>
    <span id="themeLabel">ليلي</span>
  </button>

  <!-- Header -->
  <header>
    <div class="logo-line">
      <span class="logo-icon">⏳</span>
    </div>
    <h1>حاسبة العمر الزمني</h1>
    <p class="subtitle">عبر الحضارات والتقاويم البشرية</p>
  </header>

  <!-- Input -->
  <div class="input-section">
    <label class="input-label">✦ أدخل تاريخ ميلادك ✦</label>
    <div class="input-row">
      <input type="date" class="date-input" id="birthdate" max="">
      <button class="calc-btn" onclick="calculate()">⚡ احسب عمري</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results">

    <!-- Live Counter -->
    <div class="live-banner">
      <div class="live-label"><span class="live-dot"></span> عداد حي يتحدث لحظياً</div>
      <div class="live-seconds" id="liveSeconds">0</div>
      <div class="live-unit">ثانية مرّت منذ ولادتك</div>
    </div>

    <!-- Main Stats -->
    <div class="section-title">📊 ملخص عمرك</div>
    <div class="stats-grid">
      <div class="stat-card" data-type="seconds">
        <div class="stat-icon">⚡</div>
        <div class="stat-value" id="totalSeconds">-</div>
        <div class="stat-label">ثانية</div>
      </div>
      <div class="stat-card" data-type="minutes">
        <div class="stat-icon">🕐</div>
        <div class="stat-value" id="totalMinutes">-</div>
        <div class="stat-label">دقيقة</div>
      </div>
      <div class="stat-card" data-type="hours">
        <div class="stat-icon">🌙</div>
        <div class="stat-value" id="totalHours">-</div>
        <div class="stat-label">ساعة</div>
      </div>
      <div class="stat-card" data-type="days">
        <div class="stat-icon">☀️</div>
        <div class="stat-value" id="totalDays">-</div>
        <div class="stat-label">يوم</div>
      </div>
      <div class="stat-card" data-type="weeks">
        <div class="stat-icon">📅</div>
        <div class="stat-value" id="totalWeeks">-</div>
        <div class="stat-label">أسبوع</div>
      </div>
      <div class="stat-card" data-type="months">
        <div class="stat-icon">🌙</div>
        <div class="stat-value" id="totalMonths">-</div>
        <div class="stat-label">شهر</div>
      </div>
      <div class="stat-card" data-type="years">
        <div class="stat-icon">🏆</div>
        <div class="stat-value" id="totalYears">-</div>
        <div class="stat-label">سنة</div>
      </div>
    </div>

    <!-- Next Birthday -->
    <div class="birthday-card">
      <div class="birthday-title">🎂 الوقت المتبقي على عيد ميلادك القادم</div>
      <div class="birthday-count" id="nextBirthday">-</div>
      <div class="birthday-sub" id="nextBirthdayDate">-</div>
    </div>

    <!-- Calendar Systems -->
    <div class="section-title">🗓️ عمرك عبر تقاويم الحضارات</div>
    <div class="calendars-grid" id="calendarsGrid"></div>

    <!-- Fun Facts -->
    <div class="section-title">✨ حقائق مذهلة عن عمرك</div>
    <div class="facts-grid" id="factsGrid"></div>

  </div>

</div>

<script>
// Set max date to today
document.getElementById('birthdate').max = new Date().toISOString().split('T')[0];

let liveInterval = null;

function formatNumber(n) {
  return Math.floor(n).toLocaleString('ar-SA');
}

function calculate() {
  const birthdateVal = document.getElementById('birthdate').value;
  if (!birthdateVal) {
    alert('يرجى إدخال تاريخ الميلاد أولاً');
    return;
  }

  const birthdate = new Date(birthdateVal);
  const now = new Date();

  if (birthdate > now) {
    alert('تاريخ الميلاد لا يمكن أن يكون في المستقبل!');
    return;
  }

  // Show results
  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'block';
  resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Update live counter
  if (liveInterval) clearInterval(liveInterval);

  function updateLive() {
    const n = new Date();
    const diffMs = n - birthdate;
    const secs = diffMs / 1000;

    document.getElementById('liveSeconds').textContent = formatNumber(secs);

    // Update seconds card too
    document.getElementById('totalSeconds').textContent = formatNumber(secs);
    document.getElementById('totalMinutes').textContent = formatNumber(secs / 60);
    document.getElementById('totalHours').textContent = formatNumber(secs / 3600);
    document.getElementById('totalDays').textContent = formatNumber(secs / 86400);
    document.getElementById('totalWeeks').textContent = formatNumber(secs / (86400 * 7));
    document.getElementById('totalMonths').textContent = formatNumber(secs / (86400 * 30.44));
    document.getElementById('totalYears').textContent = formatNumber(secs / (86400 * 365.25));
  }

  updateLive();
  liveInterval = setInterval(updateLive, 1000);

  // Next birthday
  updateNextBirthday(birthdate);

  // Calendars
  renderCalendars(birthdate);

  // Facts
  renderFacts(birthdate);
}

function updateNextBirthday(birthdate) {
  const now = new Date();
  let nextBD = new Date(now.getFullYear(), birthdate.getMonth(), birthdate.getDate());
  if (nextBD <= now) nextBD.setFullYear(now.getFullYear() + 1);

  const diff = nextBD - now;
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);

  document.getElementById('nextBirthday').textContent =
    `${days} يوم، ${hours} ساعة، ${mins} دقيقة`;
  document.getElementById('nextBirthdayDate').textContent =
    `بتاريخ ${nextBD.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;
}

// === CALENDAR CONVERSIONS ===

function toHijri(date) {
  // Using Umm al-Qura approximation
  const jd = gregorianToJD(date.getFullYear(), date.getMonth() + 1, date.getDate());
  return jdToHijri(jd);
}

function gregorianToJD(y, m, d) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5;
}

function jdToHijri(jd) {
  const z = Math.floor(jd) + 0.5;
  const epoch = 1948438.5; // Hijri epoch
  const days = z - epoch;
  const year = Math.floor((30 * days + 10646) / 10631);
  const yearStart = Math.floor(((11 * year + 3) / 30) + 354 * year + 30 - 385) + epoch;
  const dayOfYear = Math.floor(z - yearStart + 1);
  let month = 0;
  let cumDays = 0;
  for (let m = 1; m <= 12; m++) {
    const mDays = (m % 2 === 1 || m === 12) ? 30 : 29;
    if (dayOfYear <= cumDays + mDays) { month = m; break; }
    cumDays += mDays;
  }
  const day = dayOfYear - cumDays;
  return { year, month, day };
}

function toPersian(date) {
  const g_y = date.getFullYear() - 1600;
  const g_m = date.getMonth() - 2;
  const g_d = date.getDate() - 1;
  let g_dy = 365 * g_y + Math.floor((g_y + 3) / 4) - Math.floor((g_y + 99) / 100) + Math.floor((g_y + 399) / 400);
  const gMonthDays = [31, (g_y % 4 === 0 && (g_y % 100 !== 0 || g_y % 400 === 0)) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
  for (let i = 0; i < 12; i++) {
    if (i < g_m + 2) g_dy += gMonthDays[i]; else break;
  }
  g_dy += g_d;
  let j_dy = g_dy - 79;
  const j_np = Math.floor(j_dy / 12053);
  j_dy = j_dy % 12053;
  let j_y = 979 + 33 * j_np + 4 * Math.floor(j_dy / 1461);
  j_dy = j_dy % 1461;
  if (j_dy >= 366) { j_y += Math.floor((j_dy - 1) / 365); j_dy = (j_dy - 1) % 365; }
  let j_m = 0, j_d = 0;
  for (let i = 0; i < 11; i++) {
    const jm = i < 6 ? 31 : 30;
    if (j_dy >= jm) { j_dy -= jm; j_m++; } else break;
  }
  j_d = j_dy + 1;
  return { year: j_y, month: j_m + 1, day: j_d };
}

function toHebrew(date) {
  // Approximate Hebrew calendar conversion
  const jd = gregorianToJD(date.getFullYear(), date.getMonth() + 1, date.getDate());
  let year = Math.floor((jd - 347996.5) / 365.25) + 1;
  // Adjust
  while (hebrewNewYear(year + 1) <= jd) year++;
  while (hebrewNewYear(year) > jd) year--;
  const dayOfYear = Math.floor(jd - hebrewNewYear(year)) + 1;
  const months = [30, 29, 29, 29, 30, 29, 30, 29, 30, 29, 30, 29, 29];
  let month = 1, cum = 0;
  for (let m = 0; m < months.length; m++) {
    if (dayOfYear <= cum + months[m]) { month = m + 1; break; }
    cum += months[m];
  }
  const day = dayOfYear - cum;
  return { year, month: Math.min(month, 12), day: Math.max(1, day) };
}

function hebrewNewYear(year) {
  return 347996.5 + 365.25 * (year - 1);
}

function toEthiopian(date) {
  const jd = gregorianToJD(date.getFullYear(), date.getMonth() + 1, date.getDate());
  const ethiopianEpoch = 1724220.5;
  const days = jd - ethiopianEpoch;
  const year = Math.floor(days / 365.25) + 1;
  const startOfYear = ethiopianEpoch + (year - 1) * 365.25;
  const dayOfYear = Math.floor(jd - startOfYear) + 1;
  const month = Math.min(13, Math.floor((dayOfYear - 1) / 30) + 1);
  const day = dayOfYear - (month - 1) * 30;
  return { year: Math.floor(year), month, day: Math.max(1, day) };
}

function toCoptic(date) {
  const jd = gregorianToJD(date.getFullYear(), date.getMonth() + 1, date.getDate());
  const copticEpoch = 1825029.5;
  const days = jd - copticEpoch;
  const year = Math.floor(days / 365.25) + 1;
  const startOfYear = copticEpoch + (year - 1) * 365.25;
  const dayOfYear = Math.floor(jd - startOfYear) + 1;
  const month = Math.min(13, Math.floor((dayOfYear - 1) / 30) + 1);
  const day = dayOfYear - (month - 1) * 30;
  return { year: Math.floor(year), month, day: Math.max(1, day) };
}

function toMayan(date) {
  // Long Count
  const jd = Math.floor(gregorianToJD(date.getFullYear(), date.getMonth() + 1, date.getDate()));
  const mayanEpoch = 584282;
  const lc = jd - mayanEpoch;
  const baktun = Math.floor(lc / 144000);
  const katun = Math.floor((lc % 144000) / 7200);
  const tun = Math.floor((lc % 7200) / 360);
  const uinal = Math.floor((lc % 360) / 20);
  const kin = lc % 20;
  return { baktun, katun, tun, uinal, kin };
}

function toChinese(date) {
  const year = date.getFullYear();
  const chineseYear = year - 2697; // approximate Huangdi epoch
  const cycle = Math.floor(chineseYear / 60) + 1;
  const yearInCycle = ((chineseYear - 1) % 60) + 1;
  const animals = ['الفأر','الثور','النمر','الأرنب','التنين','الأفعى','الحصان','الماعز','القرد','الديك','الكلب','الخنزير'];
  const animal = animals[(year - 4) % 12];
  return { year: chineseYear, cycle, yearInCycle, animal };
}

function toJapanese(date) {
  const year = date.getFullYear();
  let era = '', eraYear = 0;
  if (year >= 2019) { era = 'رِيوَا (令和)'; eraYear = year - 2018; }
  else if (year >= 1989) { era = 'هيسي (平成)'; eraYear = year - 1988; }
  else if (year >= 1926) { era = 'شوا (昭和)'; eraYear = year - 1925; }
  else if (year >= 1912) { era = 'تايشو (大正)'; eraYear = year - 1911; }
  else if (year >= 1868) { era = 'ميجي (明治)'; eraYear = year - 1867; }
  else { era = 'قبل ميجي'; eraYear = year; }
  return { era, eraYear };
}

function toRoman(date) {
  const year = date.getFullYear();
  const abUrbe = year + 753;
  return { year: abUrbe, original: year };
}

function toByzantine(date) {
  return { year: date.getFullYear() + 5508 };
}

function toJulian(date) {
  const y = date.getFullYear();
  const m = date.getMonth() + 1;
  const d = date.getDate();
  const jd = gregorianToJD(y, m, d);
  // Reverse from JD to Julian calendar
  const z = Math.floor(jd + 0.5);
  const a = z;
  const b = a + 1524;
  const c = Math.floor((b - 122.1) / 365.25);
  const dd = Math.floor(365.25 * c);
  const e = Math.floor((b - dd) / 30.6001);
  const day = b - dd - Math.floor(30.6001 * e);
  const month = e < 14 ? e - 1 : e - 13;
  const year = month > 2 ? c - 4716 : c - 4715;
  return { year, month, day };
}

const monthsAr = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const hijriMonths = ['محرم','صفر','ربيع الأول','ربيع الثاني','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];

// ===== THEME TOGGLE =====
let isLight = false;

function toggleTheme() {
  isLight = !isLight;
  const html = document.documentElement;
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');

  if (isLight) {
    html.classList.add('light');
    icon.textContent = '☀️';
    label.textContent = 'نهاري';
  } else {
    html.classList.remove('light');
    icon.textContent = '🌙';
    label.textContent = 'ليلي';
  }

  // Save preference
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

// Load saved preference
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    isLight = true;
    document.documentElement.classList.add('light');
    // Will update icons after DOM ready
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('themeIcon').textContent = '☀️';
      document.getElementById('themeLabel').textContent = 'نهاري';
    });
  }
})();

function getSeason(date) {
  const m = date.getMonth();
  if (m >= 2 && m <= 4) return '🌸 الربيع';
  if (m >= 5 && m <= 7) return '☀️ الصيف';
  if (m >= 8 && m <= 10) return '🍂 الخريف';
  return '❄️ الشتاء';
}

function renderFacts(birthdate) {
  const now = new Date();
  const diffMs = now - birthdate;
  const totalDays = Math.floor(diffMs / 86400000);
  const totalSeconds = Math.floor(diffMs / 1000);

  const facts = [
    { icon: '💓', label: 'ضربات القلب التقريبية', value: `${formatNumber(totalSeconds * 1.1667)} ضربة` },
    { icon: '😴', label: 'ساعات النوم التقريبية', value: `${formatNumber(totalDays * 8)} ساعة` },
    { icon: '🍽️', label: 'وجبات تقريبية', value: `${formatNumber(totalDays * 3)} وجبة` },
    { icon: '🌅', label: 'شروق شمس رأيته', value: `${formatNumber(totalDays)} شروق` },
    { icon: '🌙', label: 'دورات قمرية كاملة', value: `${formatNumber(diffMs / (29.53 * 86400000))} دورة` },
    { icon: '🌎', label: 'دورات الأرض حول الشمس', value: `${(diffMs / (365.25 * 86400000)).toFixed(4)} دورة` },
    { icon: '💧', label: 'أنفاس تقريبية', value: `${formatNumber(totalSeconds * 0.267)} نفس` },
    { icon: '⚡', label: 'خطوات مشيتها (تقريباً)', value: `${formatNumber(totalDays * 7500)} خطوة` },
  ];

  document.getElementById('factsGrid').innerHTML = facts.map((f, i) => `
    <div class="fact-card" style="animation: fadeUp 0.5s ease ${i * 0.05}s both">
      <div class="fact-icon">${f.icon}</div>
      <div class="fact-text">
        <strong>${f.value}</strong><br>${f.label}
      </div>
    </div>
  `).join('');
}
